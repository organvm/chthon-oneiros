name: Catalog Validator
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Catalog Integrity
        run: |
          # Simple check to ensure the catalog file exists.
          if [ -f docs/CATALOG.md ]; then
            echo "Found docs/CATALOG.md"
          elif [ -f CATALOG.md ]; then
            echo "Found CATALOG.md"
          else
            echo "CATALOG.md missing (checked docs/CATALOG.md and CATALOG.md)"
            exit 1
          fi
          # Future: Add script to verify all .md files are indexed
